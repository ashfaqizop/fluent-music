name: app
description: "Fluent Music - a premium native YouTube Music client for Windows."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.9.0

resolution: workspace

dependencies:
  audio_engine:
    path: ../packages/audio_engine
  core:
    path: ../packages/core
  database:
    path: ../packages/database
  dio: any
  drift: any
  extraction:
    path: ../packages/extraction
  fluent_ui: any
  fluentui_system_icons: any
  flutter:
    sdk: flutter
  flutter_acrylic: any
  flutter_riverpod: any
  http: any
  innertube_client:
    path: ../packages/innertube_client
  media_integration:
    path: ../packages/media_integration
  media_kit: any
  path_provider: any
  remote_config:
    path: ../packages/remote_config
  system_theme: any
  window_manager: any
  youtube_explode_dart: any

dev_dependencies:
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
  assets:
    - assets/branding/full-logo.png
    - assets/branding/only-icon-logo.png
  fonts:
    - family: Plus Jakarta Sans
      fonts:
        - asset: assets/fonts/PlusJakartaSans/PlusJakartaSans-Regular.ttf
        - asset: assets/fonts/PlusJakartaSans/PlusJakartaSans-Medium.ttf
          weight: 500
        - asset: assets/fonts/PlusJakartaSans/PlusJakartaSans-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/PlusJakartaSans/PlusJakartaSans-Bold.ttf
          weight: 700

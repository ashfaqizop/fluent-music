name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.44.x
          cache: true

      # media_integration's smtc_windows dependency (Rust, via
      # flutter_rust_bridge) enters app/'s build graph starting Phase 2;
      # `flutter build windows` compiles its Rust bridge as part of the
      # CMake build, so rustup/cargo must be present before the "Build &
      # package portable release" step below. windows-latest runners are
      # not guaranteed to ship it, so install explicitly rather than assume.
      - name: Set up Rust toolchain (for smtc_windows)
        uses: dtolnay/rust-toolchain@stable

      - name: Activate melos
        run: dart pub global activate melos

      - name: Add pub cache bin to PATH
        shell: pwsh
        run: |
          "$env:LOCALAPPDATA\Pub\Cache\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Bootstrap workspace (flutter pub get)
        run: flutter pub get

      - name: Run code generation (build_runner)
        run: dart run melos exec --depends-on=build_runner -- dart run build_runner build

      - name: Analyze
        run: melos run analyze --no-select

      - name: Check formatting
        run: melos run format-check --no-select

      - name: Run tests
        run: melos run test --no-select

      - name: Integration smoke test (search -> resolve -> fetch audio)
        id: smoke
        continue-on-error: true
        run: dart run packages/extraction/bin/smoke.dart

      - name: Surface smoke-test outcome
        if: steps.smoke.outcome == 'failure'
        shell: pwsh
        run: |
          Write-Output "::warning::Integration smoke test failed - likely a live-YouTube/CI-network issue (geo-blocking, soft rate-limiting, or an upstream extraction break), not necessarily a code regression. See the 'Integration smoke test' step log above. This step is intentionally non-blocking; see docs/deviations.md."

      - name: Playback smoke test (search -> resolve -> real media_kit decode)
        id: playback_smoke
        continue-on-error: true
        run: dart run app/bin/smoke_playback.dart

      - name: Surface playback smoke-test outcome
        if: steps.playback_smoke.outcome == 'failure'
        shell: pwsh
        run: |
          Write-Output "::warning::Playback smoke test failed - could be a live-YouTube/CI-network issue, or media_kit failing to locate/initialize libmpv outside a full flutter-build output tree (unverified as of Phase 2 - see docs/deviations.md). Non-blocking pending confirmation this is reliable in CI; the reference-laptop manual pass is the authoritative check for Phase 2's DoD."

      - name: Build & package portable release
        shell: pwsh
        run: ./scripts/make-portable.ps1

      - name: Upload portable artifact
        uses: actions/upload-artifact@v4
        with:
          name: fluent-music-portable-windows-x64
          path: dist/*.zip
          if-no-files-found: error

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Download portable artifact
        uses: actions/download-artifact@v4
        with:
          name: fluent-music-portable-windows-x64
          path: dist

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.zip

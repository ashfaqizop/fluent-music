name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.44.x
          cache: true

      - name: Activate melos
        run: dart pub global activate melos

      - name: Add pub cache bin to PATH
        shell: pwsh
        run: |
          "$env:LOCALAPPDATA\Pub\Cache\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Bootstrap workspace (flutter pub get)
        run: flutter pub get

      - name: Run code generation (build_runner)
        run: dart run melos exec --depends-on=build_runner -- dart run build_runner build

      - name: Analyze
        run: melos run analyze --no-select

      - name: Check formatting
        run: melos run format-check --no-select

      - name: Run tests
        run: melos run test --no-select

      - name: Build & package portable release
        shell: pwsh
        run: ./scripts/make-portable.ps1

      - name: Upload portable artifact
        uses: actions/upload-artifact@v4
        with:
          name: fluent-music-portable-windows-x64
          path: dist/*.zip
          if-no-files-found: error

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Download portable artifact
        uses: actions/download-artifact@v4
        with:
          name: fluent-music-portable-windows-x64
          path: dist

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.zip
